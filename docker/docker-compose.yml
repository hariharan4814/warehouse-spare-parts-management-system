services:
  postgres:
    image: postgres:16-alpine
    container_name: wspms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: warehouse_spare_parts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warehouse_spare_parts"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend and frontend services will be configured in future sprints.

volumes:
  postgres_data:
